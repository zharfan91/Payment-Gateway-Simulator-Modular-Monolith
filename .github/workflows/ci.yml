name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
      - run: go mod download
      - run: go test ./...
      - run: go test -tags=integration ./...
      - run: go build ./cmd/api ./cmd/worker
